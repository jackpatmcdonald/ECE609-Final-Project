# Joint state controller
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

# Arm trajectory controller
arm_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
  gains:
    joint1: { p: 800,  i: 0.0, d: 20 }
    joint2: { p: 800,  i: 0.0, d: 20 }
    joint3: { p: 800,  i: 0.0, d: 20 }
    joint4: { p: 800,  i: 0.0, d: 20 }
  state_publish_rate:  50
  action_monitor_rate: 20
  stop_trajectory_duration: 0.5

# Gripper controller
gripper_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - gripper
    - gripper_sub
  gains:
    gripper:     { p: 500, i: 0.0, d: 10 }
    gripper_sub: { p: 500, i: 0.0, d: 10 }
  state_publish_rate:  50
  action_monitor_rate: 20
  stop_trajectory_duration: 0.5